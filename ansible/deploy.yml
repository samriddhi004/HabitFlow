---
- name: Deploy HabitFlow
  hosts: app_servers
  become: no

  vars:
    image_full:     "samriddhi004/habitflow"
    image_tag:      "latest"
    container_name: "habitflow-app"
    app_port:       5000

  tasks:

    - name: Pull new image
      command: docker pull {{ image_full }}:{{ image_tag }}

    - name: Stop old container
      command: docker stop {{ container_name }}
      ignore_errors: yes

    - name: Remove old container
      command: docker rm {{ container_name }}
      ignore_errors: yes

    - name: Start new container
      command: >
        docker run -d
        --name {{ container_name }}
        --restart unless-stopped
        --network monitoring
        -p {{ app_port }}:5000
        -v habitflow_data:/data
        -e APP_VERSION={{ image_tag }}
        -e DB_PATH=/data/habits.db
        {{ image_full }}:{{ image_tag }}

    - name: Wait for app to be healthy
      uri:
        url: "http://localhost:{{ app_port }}/health"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 12
      delay: 5

    - name: Report success
      debug:
        msg: "✅ HabitFlow {{ image_tag }} is live on port {{ app_port }}"